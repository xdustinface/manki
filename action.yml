name: 'Manki Review'
description: 'Multi-agent AI code review for GitHub — a planner picks the team, agents review in parallel, dedup removes repeats, and a judge filters the noise.'
author: 'xdustinface'

inputs:
  claude_code_oauth_token:
    description: 'Claude Code OAuth token for Max subscription authentication'
    required: false
  anthropic_api_key:
    description: 'Anthropic API key (alternative to OAuth token)'
    required: false
  github_token:
    description: 'GitHub token for posting reviews and comments (not required when using GitHub App auth)'
    required: false
  config_path:
    description: 'Path to .manki.yml config file'
    required: false
    default: '.manki.yml'
  memory_repo_token:
    description: 'GitHub token with access to the review memory repository'
    required: false
  github_app_id:
    description: 'GitHub App ID for custom bot identity (reviews show as the app name)'
    required: false
  github_app_private_key:
    description: 'GitHub App private key (PEM format) for generating installation tokens'
    required: false
  manki_token_url:
    description: 'Token service URL for GitHub App identity (default: https://manki-api.dustinface.me/token)'
    required: false
    default: 'https://manki-api.dustinface.me/token'

outputs:
  review_id:
    description: 'The GitHub review ID that was posted'
  verdict:
    description: 'Review verdict: APPROVE, COMMENT, or REQUEST_CHANGES'
  findings_count:
    description: 'Total number of findings'
  findings_json:
    description: 'JSON array of all findings (for downstream processing)'
  severity_counts:
    description: 'JSON object with severity counts: {required, suggestion, nit, ignore}'
  judge_model:
    description: 'Model used for the judge agent'

runs:
  using: 'node20'
  main: 'dist/index.js'
  post: 'dist/index.js'
  post-if: cancelled() || failure()

branding:
  icon: 'eye'
  color: 'green'
